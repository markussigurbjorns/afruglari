[piece]
voices = 4
steps = 36
registers = 5
timbres = 7
intensities = 6
seed = 220
output = "target/pieces/collision-machine-220.wav"
render_mode = "sub-machine"

[render]
sample_rate = 44100
step_seconds = 0.17
tail_seconds = 3.5
stereo_width = 0.88
delay_mix = 0.16
delay_feedback = 0.32
delay_seconds = 0.31
drive = 1.38
brightness = 0.95
roughness = 1.40
sustain = 1.20

[[section]]
name = "idle"
start = 0
end = 10

[[section]]
name = "press"
start = 10
end = 26

[[section]]
name = "jam"
start = 26
end = 36

[[voice_render]]
voice = 0
preset = "buried-engine"
drive = 1.45

[[voice_render]]
voice = 1
preset = "metal-splinters"
roughness = 1.85

[[voice_render]]
voice = 2
preset = "radio-wound"
roughness = 2.30

[[voice_render]]
voice = 3
preset = "organ-fog"
sustain = 2.50

[[section_render]]
section = "idle"
preset = "low-ritual"
sustain = 2.80

[[section_render]]
section = "press"
preset = "metal-splinters"
brightness = 1.35
roughness = 2.00

[[section_render]]
section = "jam"
preset = "radio-wound"
drive = 1.85
roughness = 2.70
sustain = 0.45

[[constraint]]
type = "exact-count"
section = "idle"
param = "active"
value = true
density = 0.30

[[constraint]]
type = "exact-count"
section = "press"
param = "active"
value = true
density = 0.44

[[constraint]]
type = "exact-count"
section = "jam"
param = "active"
value = true
density = 0.58

[[constraint]]
type = "max-run"
voice = 0
param = "active"
len = 4

[[constraint]]
type = "max-run"
voice = 1
param = "active"
len = 3

[[constraint]]
type = "max-run"
voice = 2
param = "active"
len = 3

[[constraint]]
type = "min-density-window"
param = "active"
window = 12
min = 2

[[constraint]]
type = "at-least-collisions"
section = "press"
voice_a = 1
voice_b = 2
count = 3

[[constraint]]
type = "phase-response"
section = "press"
voice_a = 0
voice_b = 3
offset = 3
min = 3

[[constraint]]
type = "anti-repeat-window"
section = "jam"
voice = 1
param = "timbre"
window = 4
max_repeats = 2
